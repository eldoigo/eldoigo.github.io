<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5TLD642XJJ"></script>
  <script>
    window.dataLayer=window.dataLayer||[];
    function gtag(){dataLayer.push(arguments);}
    gtag('js',new Date()); gtag('config','G-5TLD642XJJ');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us — Dominic's Italian &amp; BBQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --dark:#0f0b08; --mid:#1e1510; --mid-light:#2a1f14;
      --crimson:#9b2335; --gold:#c9943a; --cream:#f5ede0;
      --cream-dk:#e2d0b8; --white:#fdfaf6; --muted:#7a6a58;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{font-size:16px;}
    body{
      font-family:'DM Sans',-apple-system,sans-serif;
      background:var(--dark); color:var(--cream); min-height:100vh;
      display:flex; flex-direction:column;
    }
    /* NAV */
    nav{
      background:rgba(12,8,5,0.96); backdrop-filter:blur(14px);
      border-bottom:1px solid var(--mid-light);
      height:68px; display:flex; align-items:center; padding:0 32px;
    }
    nav a{
      font-family:'Cormorant Garamond',serif;
      font-size:20px; font-style:italic; color:var(--white);
      text-decoration:none; display:flex; align-items:center; gap:10px;
    }
    nav a span{
      font-size:9px; font-style:normal; letter-spacing:2px;
      text-transform:uppercase; color:var(--gold); display:block;
    }
    /* FORM PAGE */
    .form-wrap{
      flex:1;
      background:url('img/contact.webp') center/cover no-repeat;
      position:relative; display:flex; align-items:center; justify-content:center;
      padding:60px 20px;
    }
    .form-wrap::before{
      content:''; position:absolute; inset:0;
      background:rgba(9,6,3,0.87);
    }
    .form-card{
      position:relative; z-index:2;
      background:rgba(255,255,255,0.04);
      border:1px solid var(--mid-light);
      border-radius:10px; padding:48px 44px;
      width:100%; max-width:540px;
      backdrop-filter:blur(8px);
    }
    .form-eyebrow{
      font-size:10px; letter-spacing:2.5px; text-transform:uppercase;
      color:var(--gold); margin-bottom:10px;
    }
    .form-title{
      font-family:'Cormorant Garamond',serif;
      font-size:36px; font-style:italic; color:var(--white);
      margin-bottom:6px;
    }
    .form-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
    .form-sub a{color:var(--cream-dk);}
    .fgroup{margin-bottom:18px;}
    label{
      display:block; font-size:11px; letter-spacing:1.5px;
      text-transform:uppercase; color:var(--gold); margin-bottom:6px;
    }
    input,textarea,select{
      width:100%; background:rgba(255,255,255,0.06);
      border:1px solid var(--mid-light); border-radius:5px;
      padding:12px 14px; font-family:'DM Sans',sans-serif;
      font-size:14px; color:var(--white); outline:none;
      transition:border-color 0.2s;
    }
    input:focus,textarea:focus,select:focus{border-color:var(--gold);}
    textarea{min-height:130px; resize:vertical;}
    .submit-btn{
      width:100%; padding:14px; border:none; border-radius:5px;
      background:var(--crimson); color:#fff;
      font-family:'DM Sans',sans-serif; font-size:15px; font-weight:500;
      cursor:pointer; transition:background 0.2s, transform 0.15s;
      letter-spacing:0.3px; margin-top:8px;
    }
    .submit-btn:hover{background:#7a1c2a; transform:translateY(-1px);}
    .back-link{
      display:inline-flex; align-items:center; gap:6px;
      color:var(--muted); font-size:13px; text-decoration:none;
      margin-top:20px; transition:color 0.2s;
    }
    .back-link:hover{color:var(--gold);}
    /* footer */
    .form-footer{
      background:var(--dark); border-top:1px solid var(--mid-light);
      padding:18px 32px; text-align:center;
      font-size:12px; color:#4a3a2a;
    }
    @media(max-width:600px){
      .form-card{padding:32px 24px;}
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">
      Dominic's
      <span>Italian &amp; BBQ · Back to Menu</span>
    </a>
  </nav>

  <div class="form-wrap">
    <div class="form-card">
      <p class="form-eyebrow">Get in Touch</p>
      <h1 class="form-title">Send Us a Message</h1>
      <p class="form-sub">
        Or call us on <a href="tel:01482351156"><strong style="color:var(--white);">01482 351156</strong></a><br>
        We'll get back to you as soon as possible.
      </p>

      <form action="mailto:contact@dominicsanlaby.co.uk" method="post" enctype="text/plain">
        <div class="fgroup">
          <label for="fname">Your Name</label>
          <input type="text" id="fname" name="name" placeholder="e.g. John Smith" required />
        </div>
        <div class="fgroup">
          <label for="femail">Email Address</label>
          <input type="email" id="femail" name="email" placeholder="you@example.com" required />
        </div>
        <div class="fgroup">
          <label for="fphone">Phone Number (optional)</label>
          <input type="tel" id="fphone" name="phone" placeholder="01482 ..." />
        </div>
        <div class="fgroup">
          <label for="fsubject">Subject</label>
          <input type="text" id="fsubject" name="subject" placeholder="e.g. Enquiry, Feedback, Order query..." />
        </div>
        <div class="fgroup">
          <label for="fmsg">Message</label>
          <textarea id="fmsg" name="message" placeholder="Your message here..." required></textarea>
        </div>
        <button class="submit-btn" type="submit">Send Message &rarr;</button>
      </form>

      <a class="back-link" href="index.html">← Back to menu</a>
    </div>
  </div>

  <div class="form-footer">
    &copy; 2025 Dominic's Italian &amp; BBQ · 249 Hull Road, Anlaby Common, Hull · 01482 351156
  </div>

</body>
</html>
